run:
  timeout: 5m
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - gofmt
    - goimports
    - bodyclose
    - copyloopvar
    - gosec
    - revive

linters-settings:
  gosec:
    excludes:
      # G404: weak random in ringbuf decode is intentional (it's not random).
      - G404
  revive:
    rules:
      - name: var-naming
      - name: indent-error-flow
      - name: errorf

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    # Tests can use simpler error handling.
    - path: _test\.go
      linters:
        - errcheck
        - gosec
    # bpf2go-generated stubs/objects: field/type names mirror C symbols.
    - path: internal/loader/adblocker_bpf(el|eb)\.go
      linters:
        - unused
        - revive
        - gosec
        - staticcheck
        - gofmt
        - goimports
