default: true

# Long lines are fine in tables and code blocks; we don't want a hard wrap.
MD013: false
# Allow inline HTML for badges, callouts, etc.
MD033: false
# Allow duplicate headers under different parents (TOC + body section).
MD024:
  siblings_only: true
# Allow ordered list items to all use 1.
MD029: false
# Tab-indented Go/Rust/shell snippets are valid in fenced code; only flag
# tabs in prose.
MD010:
  code_blocks: false
