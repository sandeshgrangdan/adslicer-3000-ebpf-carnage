[workspace]
members = ["cargo:tui"]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.30.3"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell"]
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-unknown-linux-gnu", "x86_64-unknown-linux-gnu", "x86_64-unknown-linux-musl"]
# The archive format to use for non-windows builds (defaults .tar.xz)
unix-archive = ".tar.gz"
# Path that installers should place binaries in
install-path = "CARGO_HOME"
# Whether to install an updater program
install-updater = true
# Don't try to create the GitHub Release - the goreleaser pipeline in
# release-go.yml owns release creation. cargo-dist just uploads its
# binaries / installer to the existing release.
#
# IMPORTANT: after running `cargo dist generate`, re-apply the manual
# patch to .github/workflows/release.yml that adds a "wait for release
# to be created by release-go.yml" step at the top of the `host` job.
# Without it, cargo-dist races goreleaser and fails with "release not
# found" when the host job runs before goreleaser finishes uploading.
create-release = false
# Permit our manual patch to .github/workflows/release.yml (the
# wait-for-release step). Without this, cargo-dist's plan job rejects
# any release.yml that diverges from what `dist generate` would emit.
allow-dirty = ["ci"]
