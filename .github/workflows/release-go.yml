name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to (re)release, e.g. v0.1.0"
        required: true

permissions:
  contents: write          # for creating GitHub Releases
  packages: write          # for pushing to GHCR
  id-token: write          # for cosign keyless (optional)

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  goreleaser:
    name: goreleaser (linux amd64+arm64, deb/rpm, ghcr image)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # goreleaser needs full history for changelog

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: install BPF toolchain
        run: |
          set -eu
          sudo apt-get update
          # `bpftool` on Ubuntu 24.04 is a virtual package; the
          # /usr/sbin/bpftool wrapper only resolves
          # /usr/lib/linux-tools/$(uname -r)/bpftool, which doesn't ship
          # for Azure-flavored runner kernels. Install
          # linux-tools-{common,generic} and symlink the binary directly
          # to PATH so we bypass the kernel-version-matching wrapper.
          sudo apt-get install -y --no-install-recommends \
            clang llvm libbpf-dev linux-tools-common linux-tools-generic make
          GENERIC_BPFTOOL="$(ls -1 /usr/lib/linux-tools/*/bpftool 2>/dev/null | head -1)"
          if [ -z "$GENERIC_BPFTOOL" ]; then
            echo "::error::no bpftool binary under /usr/lib/linux-tools/*"
            exit 1
          fi
          sudo ln -sf "$GENERIC_BPFTOOL" /usr/local/bin/bpftool
          go install github.com/cilium/ebpf/cmd/bpf2go@latest
          clang --version
          llvm-strip --version
          bpftool version

      - name: regenerate vmlinux.h from runner BTF
        run: |
          set -eu
          echo "uname: $(uname -a)"
          ls -l /sys/kernel/btf/vmlinux || true
          bpftool version
          if [ ! -r /sys/kernel/btf/vmlinux ]; then
            echo "::warning::no /sys/kernel/btf/vmlinux on this runner; using checked-in placeholder"
            exit 0
          fi
          # Stderr intentionally NOT redirected: any bpftool warning/error
          # must reach the CI log so we can diagnose regressions.
          sudo bpftool btf dump file /sys/kernel/btf/vmlinux format c > bpf/vmlinux.h.new
          if [ ! -s bpf/vmlinux.h.new ]; then
            echo "::error::bpftool produced an empty vmlinux.h dump"
            rm -f bpf/vmlinux.h.new
            exit 1
          fi
          mv bpf/vmlinux.h.new bpf/vmlinux.h
          echo "bpf/vmlinux.h size: $(wc -c < bpf/vmlinux.h) bytes"
          head -3 bpf/vmlinux.h

      - name: bpf2go (compile kernel object so it's embedded into the binary)
        run: |
          set -eu
          # Diagnostics: anything that could surprise a future debugger.
          echo "vmlinux.h size: $(wc -c < bpf/vmlinux.h) bytes"
          head -3 bpf/vmlinux.h
          clang --version | head -1
          # Fail loudly if the regen step left the PLACEHOLDER vmlinux.h in
          # place. clang would fail later with cryptic "unknown type"
          # errors; this turns that into a one-line, obvious failure.
          if grep -q "PLACEHOLDER" bpf/vmlinux.h; then
            echo "::error::bpf/vmlinux.h is the checked-in placeholder; bpftool BTF dump must run before bpf2go compile"
            exit 1
          fi
          export PATH="$(go env GOPATH)/bin:$PATH"
          go generate ./...

      - name: log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: goreleaser
        # --skip=validate suppresses goreleaser's "dirty git" check. The
        # dirty files are expected build artifacts: the regen step
        # rewrites bpf/vmlinux.h with the runner's BTF dump, and bpf2go
        # rewrites internal/loader/adblocker_bpfel.go with the real
        # binding. Both must run BEFORE goreleaser (the kernel object
        # gets embedded into the Go binary via go:embed), so they're
        # always dirty at this point. We trust the pipeline; the source
        # tree is at the tagged commit.
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean --skip=validate ${{ github.event_name == 'workflow_dispatch' && '--snapshot' || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

