name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to (re)release, e.g. v0.1.0"
        required: true

permissions:
  contents: write          # for creating GitHub Releases
  packages: write          # for pushing to GHCR
  id-token: write          # for cosign keyless (optional)

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  goreleaser:
    name: goreleaser (linux amd64+arm64, deb/rpm, ghcr image)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # goreleaser needs full history for changelog

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: install BPF toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang llvm libbpf-dev linux-tools-common \
            linux-tools-generic linux-tools-$(uname -r) make
          go install github.com/cilium/ebpf/cmd/bpf2go@latest

      - name: regenerate vmlinux.h from runner BTF
        run: |
          if [ -r /sys/kernel/btf/vmlinux ]; then
            sudo bpftool btf dump file /sys/kernel/btf/vmlinux format c > bpf/vmlinux.h
          fi

      - name: bpf2go (compile kernel object so it's embedded into the binary)
        run: |
          export PATH="$(go env GOPATH)/bin:$PATH"
          go generate ./...

      - name: log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean ${{ github.event_name == 'workflow_dispatch' && '--snapshot' || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  rust-tui:
    name: rust tui (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            artifact: adblocker-tui-linux-amd64
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            artifact: adblocker-tui-linux-arm64
            cross: true
          - target: x86_64-apple-darwin
            runner: macos-13
            artifact: adblocker-tui-darwin-amd64
          - target: aarch64-apple-darwin
            runner: macos-14
            artifact: adblocker-tui-darwin-arm64
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: tui

      - name: install cross-linker (linux arm64 only)
        if: matrix.cross == true
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc-aarch64-linux-gnu

      - name: configure cross-linker
        if: matrix.cross == true
        run: |
          mkdir -p tui/.cargo
          cat > tui/.cargo/config.toml <<'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - name: build
        working-directory: tui
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: package
        working-directory: tui
        run: |
          mkdir -p out
          cp target/${{ matrix.target }}/release/adblocker-tui out/
          cp ../README.md ../LICENSE ../docs/TUI.md out/
          tar -czf ${{ matrix.artifact }}.tar.gz -C out .

      - name: checksum
        working-directory: tui
        run: shasum -a 256 ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256

      - name: upload to release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            tui/${{ matrix.artifact }}.tar.gz
            tui/${{ matrix.artifact }}.tar.gz.sha256
          fail_on_unmatched_files: true

      - name: upload artifact (workflow_dispatch path)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            tui/${{ matrix.artifact }}.tar.gz
            tui/${{ matrix.artifact }}.tar.gz.sha256
